name: Visual (Argos)

# Visual-regression prototype. Renders the app's views and uploads screenshots to Argos, which
# diffs them against the branch baseline and posts an accept/reject check on the PR (via the
# Argos GitHub App). Baselines live in Argos, NOT in git - nothing binary is committed.
#
# Runs inside the Playwright-pinned container so rendering (fonts, AA) is byte-identical to
# whatever produced the baseline - the determinism that the committed-PNG approach lacks.
#
# Upload only happens when the ARGOS_TOKEN secret is set (see tests/visual-argos/README.md).
# Until then this job still runs - it just renders + validates the screenshots and stays green.
on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  visual:
    name: Argos screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Pin to the image matching @playwright/test in package.json (1.61.1) so the render
    # environment is reproducible. Bump this tag in lockstep with Playwright upgrades.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    env:
      ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Argos needs full history to resolve the baseline commit for the comparison.
          fetch-depth: 0

      - name: Install dependencies
        run: npm ci

      - name: Build (the views render from compiled output paths)
        run: npm run build

      - name: Capture + upload screenshots
        run: npm run test:visual:argos
