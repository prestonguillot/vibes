<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 96" width="100" height="96">
  <!-- Cut by hand, like the bolt and the magnifier. A five-pointed star from a font is a symbol
       everyone else's UI uses; this one has uneven arms and no two points at the same radius, so it
       reads as something stamped on the page rather than typed into it. -->
  <path
    d="M 50,3
       L 62,34 L 96,36
       L 69,57 L 79,91
       L 50,72 L 20,92
       L 30,57 L 3,35
       L 37,33 Z"
    fill="#000"
  />
</svg>
