<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Stand-in album art for /debug/components, self-hosted: the fixtures used to point at
       via.placeholder.com, which no longer resolves.

       Built with turbulence and overlapping tones rather than flat shapes, on purpose. The print
       filters threshold against LUMINANCE: art with only a few flat tones screens to a couple of
       solid blobs, so the page would render a 1-bit treatment that looks nothing like what real
       album art does. Fine detail and continuous midtones are the whole point of the fixture. -->
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#fdf3dc"/><stop offset="0.45" stop-color="#d8894f"/>
      <stop offset="1" stop-color="#3b1f2b"/>
    </linearGradient>
    <!-- High-frequency and high-contrast on purpose. A 1-bit threshold has no dithering: smooth
         gradients collapse to one clean edge and the whole picture becomes two solid blobs. Detail
         only survives where the image's own noise straddles the threshold - that stipple IS what a
         photocopied photograph looks like, and it is the thing this fixture exists to show. -->
    <filter id="grain1" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="7" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0" result="g"/>
      <feComponentTransfer in="g" result="soft">
        <feFuncR type="linear" slope="1.6" intercept="-0.3"/>
        <feFuncG type="linear" slope="1.6" intercept="-0.3"/>
        <feFuncB type="linear" slope="1.6" intercept="-0.3"/>
      </feComponentTransfer>
      <feComposite in="SourceGraphic" in2="soft" operator="arithmetic" k1="1" k2="0" k3="0" k4="0"/>
    </filter>
    <filter id="clouds1">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.03" numOctaves="4" seed="3"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.55" intercept="0"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="300" height="300" fill="url(#sky1)"/>
  <rect width="300" height="300" filter="url(#clouds1)" opacity="0.5"/>
  <circle cx="206" cy="84" r="44" fill="#fff6dc" opacity="0.92"/>
  <circle cx="206" cy="84" r="44" fill="none" stroke="#fff" stroke-width="2" opacity="0.5"/>
  <path d="M 0 210 L 62 156 L 108 196 L 150 148 L 206 200 L 252 164 L 300 206 L 300 300 L 0 300 Z" fill="#2b1720" opacity="0.92"/>
  <path d="M 0 244 L 74 206 L 132 238 L 190 202 L 246 240 L 300 214 L 300 300 L 0 300 Z" fill="#160c12"/>
  <g stroke="#f6e2b8" stroke-width="1.2" opacity="0.35">
    <path d="M 12 268 H 288 M 12 278 H 288 M 12 288 H 288"/>
  </g>
  <rect width="300" height="300" filter="url(#grain1)" opacity="0.35"/>
</svg>
