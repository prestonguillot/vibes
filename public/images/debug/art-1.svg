<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Stand-in album art for /debug/components. Self-hosted on purpose: the fixtures used to point
       at via.placeholder.com, which no longer resolves, so the debug page rendered broken images.
       Gradients rather than flat colour because the print filters threshold against luminance -
       flat art would screen to nothing and hide the very treatment this page exists to show. -->
  <defs>
    <linearGradient id="a1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4e9d0"/><stop offset="0.55" stop-color="#c2603f"/>
      <stop offset="1" stop-color="#2b1a2e"/>
    </linearGradient>
    <radialGradient id="a1b" cx="0.7" cy="0.3" r="0.6">
      <stop offset="0" stop-color="#ffe9a8" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffe9a8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="300" height="300" fill="url(#a1)"/>
  <rect width="300" height="300" fill="url(#a1b)"/>
  <circle cx="210" cy="92" r="46" fill="#f8f1df" opacity="0.85"/>
  <path d="M 0 236 L 96 150 L 168 214 L 236 168 L 300 220 L 300 300 L 0 300 Z" fill="#231620" opacity="0.9"/>
</svg>
