<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="t1" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#402438"/><stop offset="0.55" stop-color="#b8523a"/>
      <stop offset="1" stop-color="#f8e6b6"/>
    </linearGradient>
    <filter id="hazeT">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.06" numOctaves="4" seed="5"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5" intercept="0"/></feComponentTransfer>
    </filter>
    <!-- High-frequency grain so a 1-bit threshold stipples instead of collapsing to blobs.
         See art-1.svg for the full reasoning. -->
    <filter id="gT" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="5" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0" result="g"/>
      <feComponentTransfer in="g" result="soft">
        <feFuncR type="linear" slope="1.6" intercept="-0.3"/>
        <feFuncG type="linear" slope="1.6" intercept="-0.3"/>
        <feFuncB type="linear" slope="1.6" intercept="-0.3"/>
      </feComponentTransfer>
      <feComposite in="SourceGraphic" in2="soft" operator="arithmetic" k1="1" k2="0" k3="0" k4="0"/>
    </filter>
  </defs>
  <rect width="320" height="180" fill="url(#t1)"/>
  <rect width="320" height="180" filter="url(#hazeT)" opacity="0.45"/>
  <circle cx="92" cy="60" r="30" fill="#fff2c8" opacity="0.9"/>
  <path d="M 0 132 L 72 92 L 140 126 L 208 84 L 262 118 L 320 96 L 320 180 L 0 180 Z" fill="#26141f" opacity="0.9"/>
  <path d="M 0 152 L 88 124 L 168 150 L 240 122 L 320 146 L 320 180 L 0 180 Z" fill="#130a10"/>
  <rect width="320" height="180" filter="url(#gT)" opacity="0.35"/>
</svg>
