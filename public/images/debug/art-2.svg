<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="c2" x1="0" y1="1" x2="0.4" y2="0">
      <stop offset="0" stop-color="#0d1c30"/><stop offset="0.45" stop-color="#4f86a8"/>
      <stop offset="1" stop-color="#eef6f7"/>
    </linearGradient>
    <filter id="haze2">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.05" numOctaves="4" seed="11"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5" intercept="0"/></feComponentTransfer>
    </filter>
    <!-- High-frequency grain so a 1-bit threshold stipples instead of collapsing to blobs.
         See art-1.svg for the full reasoning. -->
    <filter id="g2" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="11" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0" result="g"/>
      <feComponentTransfer in="g" result="soft">
        <feFuncR type="linear" slope="1.6" intercept="-0.3"/>
        <feFuncG type="linear" slope="1.6" intercept="-0.3"/>
        <feFuncB type="linear" slope="1.6" intercept="-0.3"/>
      </feComponentTransfer>
      <feComposite in="SourceGraphic" in2="soft" operator="arithmetic" k1="1" k2="0" k3="0" k4="0"/>
    </filter>
  </defs>
  <rect width="300" height="300" fill="url(#c2)"/>
  <rect width="300" height="300" filter="url(#haze2)" opacity="0.45"/>
  <circle cx="64" cy="70" r="32" fill="#fdf8ea" opacity="0.9"/>
  <g fill="#0a1420" opacity="0.8">
    <rect x="16" y="188" width="30" height="96"/><rect x="54" y="150" width="30" height="134"/>
    <rect x="92" y="206" width="30" height="78"/><rect x="130" y="128" width="30" height="156"/>
    <rect x="168" y="176" width="30" height="108"/><rect x="206" y="146" width="30" height="138"/>
    <rect x="244" y="198" width="30" height="86"/>
  </g>
  <g fill="#f4e7c4" opacity="0.55">
    <rect x="60" y="164" width="6" height="8"/><rect x="72" y="182" width="6" height="8"/>
    <rect x="136" y="146" width="6" height="8"/><rect x="148" y="170" width="6" height="8"/>
    <rect x="212" y="164" width="6" height="8"/><rect x="176" y="196" width="6" height="8"/>
  </g>
  <rect width="300" height="300" filter="url(#g2)" opacity="0.35"/>
</svg>
