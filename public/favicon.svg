<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- The masthead lockup at 16px: the header's red, the header's bolt. The path is the one
       public/images/bolt.svg cuts, so the tab icon and the sigils either side of SLOPSYNC are
       literally the same bolt.

       Blue on red is a muddy pairing at favicon size, so the bolt carries the same hard offset
       shadow the sigils do - at 16px that black edge is what holds the silhouette apart from the
       field. Everything else is left out on purpose: this used to carry two lettered circles, an
       arrow and four 3px squares, none of which survived being 16 pixels wide. -->
  <rect width="64" height="64" fill="#ff0040" />
  <rect x="1.5" y="1.5" width="61" height="61" fill="none" stroke="#000" stroke-width="3" />

  <g transform="rotate(-5 32 32)">
    <g transform="translate(16.6, 7.4) scale(0.335)">
      <path
        d="M 61,2 L 47,31 L 36,58 L 21,88 L 33,90 L 46,93 L 37,123 L 26,157
           L 41,137 L 58,112 L 86,66 L 71,64 L 55,61 L 64,33 L 72,3 Z"
        fill="#000"
      />
    </g>
    <g transform="translate(14.1, 5.4) scale(0.335)">
      <path
        d="M 61,2 L 47,31 L 36,58 L 21,88 L 33,90 L 46,93 L 37,123 L 26,157
           L 41,137 L 58,112 L 86,66 L 71,64 L 55,61 L 64,33 L 72,3 Z"
        fill="#0066ff"
      />
    </g>
  </g>
</svg>
