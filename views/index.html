<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify to YouTube Playlist Sync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.6/dist/htmx.min.js"></script>
    <script src="https://unpkg.com/hyperscript.org@0.9.11/dist/_hyperscript.min.js"></script>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="punk-header text-center">
                    <h1 class="punk-title">SPOTIFY <span class="punk-arrow">→</span> YOUTUBE</h1>
                    <p class="punk-subtitle">Sync your playlists with music videos</p>
                </div>

                <!-- Connection Status -->
                <div class="row mb-4">
                    <div class="col-md-6 mb-3">
                        <div class="card h-100">
                            <div class="card-body text-center">
                                <h5 class="card-title">SPOTIFY</h5>
                                <div id="spotify-status">
                                    <div class="d-flex justify-content-center align-items-center">
                                        <div class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></div>
                                        <span>Checking connection...</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="card h-100">
                            <div class="card-body text-center">
                                <h5 class="card-title">YOUTUBE</h5>
                                <div id="youtube-status">
                                    <div class="d-flex justify-content-center align-items-center">
                                        <div class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></div>
                                        <span>Checking connection...</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Playlists Section -->
                <div class="card">
                    <div class="card-header">
                        <div class="d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">Your Playlists</h5>
                            <button id="refresh-playlists-btn" class="btn btn-outline-primary btn-sm" 
                                    hx-get="/auth/spotify/playlists" 
                                    hx-target="#playlists-content"
                                    hx-vals='js:{"ownOnly": document.getElementById("ownPlaylistsOnly")?.checked || false}'
                                    hx-indicator="#loading"
                                    title="Refresh playlists">
                                Refresh
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-12">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h4>Your Spotify Playlists</h4>
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="ownPlaylistsOnly" checked
                                               hx-get="/auth/spotify/playlists"
                                               hx-target="#playlists-content"
                                               hx-trigger="change"
                                               hx-vals='js:{"ownOnly": document.getElementById("ownPlaylistsOnly").checked}'>
                                        <label class="form-check-label" for="ownPlaylistsOnly">
                                            Show only playlists I created
                                        </label>
                                    </div>
                                </div>
                                <div id="playlists-content">
                                    <p class="text-muted text-center">Connect to Spotify and YouTube to see your playlists</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Loading Indicator -->
                <div id="loading" class="text-center mt-3" style="display: none;">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2">Syncing playlist...</p>
                    <small class="text-muted">This may take a moment while we search for videos</small>
                </div>
            </div>
        </div>
    </div>

    <!-- External JavaScript Modules -->
    <script src="/js/playlistStorage.js"></script>
    <script src="/js/eventLogging.js"></script>
    <script src="/js/playlistDetails.js"></script>
    <script src="/js/syncFunctionality.js"></script>

    <!-- Connection Status Script -->
    <script>
        console.log('Page JavaScript loaded at:', new Date().toISOString());

        // Flag to prevent infinite auto-loading
        let hasAutoLoaded = false;

        // Function to update connection status
        async function updateConnectionStatus() {
            try {
                console.log('Checking authentication status...');
                const response = await fetch('/api/status');
                const status = await response.json();

                console.log('Authentication status:', status);

                // Update Spotify status
                if (status.spotify) {
                    document.getElementById('spotify-status').innerHTML =
                        '<button class="btn btn-success connect-btn" disabled>Connected</button>';
                    document.getElementById('spotify-status').style.opacity = 1;
                    console.log('✅ Spotify: Already authenticated');
                } else {
                    document.getElementById('spotify-status').innerHTML =
                        '<button class="btn btn-success connect-btn" onclick="connectToService(\'/auth/spotify/login\', this)">Connect Spotify</button>';
                    document.getElementById('spotify-status').style.opacity = 1;
                    console.log('🔑 Spotify: Authentication required');
                }

                // Update YouTube status
                if (status.youtube) {
                    document.getElementById('youtube-status').innerHTML =
                        '<button class="btn btn-danger connect-btn" disabled>Connected</button>';
                    document.getElementById('youtube-status').style.opacity = 1;
                    console.log('✅ YouTube: Already authenticated');
                } else {
                    document.getElementById('youtube-status').innerHTML =
                        '<button class="btn btn-danger connect-btn" onclick="connectToService(\'/auth/youtube/login\', this)">Connect YouTube</button>';
                    document.getElementById('youtube-status').style.opacity = 1;
                    console.log('🔑 YouTube: Authentication required');
                }

                // Auto-load playlists when both services are connected (use cache first)
                if (status.spotify && status.youtube && !hasAutoLoaded) {
                    hasAutoLoaded = true;
                    console.log('Both services connected - auto-loading playlists');

                    // Try to load from cache first
                    const loadedFromCache = loadPlaylistsFromStorage();

                    if (!loadedFromCache) {
                        // Only fetch from API if no valid cache
                        setTimeout(() => {
                            const refreshBtn = document.getElementById('refresh-playlists-btn');
                            if (refreshBtn && !refreshBtn.classList.contains('htmx-request')) {
                                console.log('Auto-loading playlists from API...');
                                htmx.trigger(refreshBtn, 'click');
                            }
                        }, 500);
                    }
                }

                // Check URL parameters for immediate feedback after OAuth redirect (but don't recurse)
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('spotify') === 'connected' || urlParams.get('youtube') === 'connected') {
                    console.log('OAuth redirect detected, status already updated above');
                    // Clear URL parameters to prevent confusion
                    if (window.history.replaceState) {
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                }

                if (urlParams.get('error')) {
                    const error = urlParams.get('error');
                    const alertDiv = document.createElement('div');
                    alertDiv.className = 'alert alert-danger alert-dismissible fade show';
                    alertDiv.innerHTML = `
                        <strong>Error:</strong> ${error.replace(/_/g, ' ')}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    `;
                    document.querySelector('.container').prepend(alertDiv);
                }
            } catch (error) {
                console.error('Error checking connection status:', error);
                // Show error state with fallback connect buttons
                document.getElementById('spotify-status').innerHTML =
                    '<button class="btn btn-success connect-btn" onclick="connectToService(\'/auth/spotify/login\', this)">Connect Spotify</button>';
                document.getElementById('spotify-status').style.opacity = 1;

                document.getElementById('youtube-status').innerHTML =
                    '<button class="btn btn-danger connect-btn" onclick="connectToService(\'/auth/youtube/login\', this)">Connect YouTube</button>';
                document.getElementById('youtube-status').style.opacity = 1;
            }
        }

        // Smooth connect function to prevent page flash
        function connectToService(url, button) {
            console.log(`Connecting to service: ${url}`);

            // Store original button text
            const originalText = button.innerHTML;

            // Show loading state
            button.innerHTML = 'Connecting...';
            button.disabled = true;
            button.classList.add('disabled');

            // Use full-page redirect instead of popup
            window.location.href = url;
        }

        // Check status on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Clear any leftover sync results from previous sessions
            document.querySelectorAll('[id^="sync-result-"]').forEach(syncResult => {
                syncResult.innerHTML = '';
            });

            updateConnectionStatus();
        });

        // Listen for OAuth success messages from popup windows
        window.addEventListener('message', function(event) {
            // Verify origin for security
            if (event.origin !== window.location.origin) {
                return;
            }

            // Handle OAuth success messages
            if (event.data && event.data.type === 'oauth-success') {
                console.log(`🎉 OAuth success received for ${event.data.service}`);

                // Refresh authentication status after successful OAuth
                setTimeout(() => {
                    updateConnectionStatus();
                }, 500); // Small delay to ensure server session is updated
            }
        });
    </script>

    <script>
        // Add logging for button clicks and HTMX events
        document.addEventListener('click', function(event) {
          // Log all button clicks
          if (event.target.matches('button')) {
            console.log(`Button clicked: "${event.target.textContent?.trim()}"`);
            console.log(`Button attributes:`, {
              id: event.target.id,
              class: event.target.className,
              onclick: event.target.onclick,
              'hx-get': event.target.getAttribute('hx-get'),
              'hx-post': event.target.getAttribute('hx-post'),
              'hx-target': event.target.getAttribute('hx-target')
            });
          }

          // Log sync button clicks specifically
          if (event.target.classList.contains('sync-btn')) {
            const playlistId = event.target.getAttribute('data-playlist-id');
            const playlistName = event.target.getAttribute('data-playlist-name');
            console.log(`Button attributes:`, {
              id: event.target.id,
              class: event.target.className,
              onclick: event.target.onclick,
              'hx-get': event.target.getAttribute('hx-get'),
              'hx-post': event.target.getAttribute('hx-post'),
              'hx-target': event.target.getAttribute('hx-target')
            });
            console.log(`Sync button clicked for playlist: "${playlistName}" (ID: ${playlistId})`);
            console.log(`Making request to: /api/sync/playlist/${playlistId}`);

            // Let HTMX handle the request automatically - no manual trigger needed
          }
        });

        // Log page navigation
        window.addEventListener('beforeunload', function(event) {
          console.log('Page navigation detected');
        });

        // Log any JavaScript errors
        window.addEventListener('error', function(event) {
          console.error('JavaScript error:', {
            message: event.message,
            filename: event.filename,
            line: event.lineno,
            column: event.colno,
            error: event.error
          });
        });

        console.log('Page JavaScript loaded at:', new Date().toISOString());
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
