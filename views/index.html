<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify to YouTube Playlist Sync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.6/dist/htmx.min.js"></script>
    <script src="https://unpkg.com/hyperscript.org@0.9.11/dist/_hyperscript.min.js"></script>
    <style>
        /* Playlist positioning and layout styles */
        .playlist-button-group {
            position: absolute;
            top: 8px;
            right: 10px;
            z-index: 10;
            display: flex;
            gap: 1rem;
        }
        
        .playlist-container {
            position: relative;
            min-height: 60px;
            padding-right: 200px;
        }
        
        .playlist-details-container {
            margin-top: 15px;
            padding: 15px;
            margin-left: -15px;
            margin-right: -15px;
            padding-left: 15px;
            padding-right: 15px;
        }
        
        .sync-feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }
        
        .sync-feedback:hover {
            opacity: 0.8;
        }
        
        .sync-feedback.fade-out {
            opacity: 0;
        }
        
        /* Loading states */
        .loading-dots::after {
            content: '';
            animation: loading-dots 1.5s infinite;
        }
        
        @keyframes loading-dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
        
        /* Success animation */
        .success-pulse {
            animation: success-pulse 0.6s ease-out;
        }
        
        @keyframes success-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        /* Button styling overrides */
        .btn-primary {
            color: #fff;
            background-color: #0d6efd;
            border-color: #0d6efd;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="punk-header text-center">
                    <h1 class="punk-title">SPOTIFY <span class="punk-arrow">→</span> YOUTUBE</h1>
                    <p class="punk-subtitle">Sync your playlists with music videos</p>
                </div>

                <!-- Connection Status -->
                <div class="row mb-4">
                    <div class="col-md-6 mb-3">
                        <div class="card h-100">
                            <div class="card-body text-center">
                                <h5 class="card-title">SPOTIFY</h5>
                                <div id="spotify-status">
                                    <div class="d-flex justify-content-center align-items-center">
                                        <div class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></div>
                                        <span>Checking connection...</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="card h-100">
                            <div class="card-body text-center">
                                <h5 class="card-title">YOUTUBE</h5>
                                <div id="youtube-status">
                                    <div class="d-flex justify-content-center align-items-center">
                                        <div class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></div>
                                        <span>Checking connection...</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Playlists Section -->
                <div class="card">
                    <div class="card-header">
                        <div class="d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">Your Playlists</h5>
                            <button id="refresh-playlists-btn" class="btn btn-outline-primary btn-sm" 
                                    hx-get="/auth/spotify/playlists" 
                                    hx-target="#playlists-content"
                                    hx-vals='js:{"ownOnly": document.getElementById("ownPlaylistsOnly")?.checked || false}'
                                    hx-indicator="#loading"
                                    title="Refresh playlists">
                                Refresh
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-12">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h4>Your Spotify Playlists</h4>
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="ownPlaylistsOnly" 
                                               hx-get="/auth/spotify/playlists"
                                               hx-target="#playlists-content"
                                               hx-trigger="change"
                                               hx-vals='js:{"ownOnly": document.getElementById("ownPlaylistsOnly").checked}'>
                                        <label class="form-check-label" for="ownPlaylistsOnly">
                                            Show only playlists I created
                                        </label>
                                    </div>
                                </div>
                                <div id="playlists-content">
                                    <p class="text-muted text-center">Connect to Spotify and YouTube to see your playlists</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Loading Indicator -->
                <div id="loading" class="text-center mt-3" style="display: none;">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2">Syncing playlist...</p>
                    <small class="text-muted">This may take a moment while we search for videos</small>
                </div>
            </div>
        </div>
    </div>

    <!-- Connection Status Script -->
    <script>
        console.log('Page JavaScript loaded at:', new Date().toISOString());
        
        // Flag to prevent infinite auto-loading
        let hasAutoLoaded = false;
        
        // Playlist persistence functions
        function savePlaylistsToStorage(playlistsHtml) {
            try {
                localStorage.setItem('spotify_playlists', playlistsHtml);
                localStorage.setItem('spotify_playlists_timestamp', Date.now().toString());
                console.log('Playlists saved to localStorage');
            } catch (error) {
                console.warn('Failed to save playlists to localStorage:', error);
            }
        }
        
        function loadPlaylistsFromStorage() {
            try {
                const timestamp = localStorage.getItem('spotify_playlists_timestamp');
                const playlistsHtml = localStorage.getItem('spotify_playlists');
                
                if (timestamp && playlistsHtml) {
                    const ageMs = Date.now() - parseInt(timestamp);
                    const ageMinutes = ageMs / (1000 * 60);
                    
                    // Cache expires after 15 minutes
                    if (ageMinutes < 15) {
                        console.log(`Loading cached playlists (${Math.round(ageMinutes)} minutes old)`);
                        document.getElementById('playlists-content').innerHTML = playlistsHtml;
                        return true;
                    } else {
                        console.log('Cached playlists expired, will refresh');
                        clearPlaylistsStorage();
                    }
                }
            } catch (error) {
                console.warn('Failed to load playlists from localStorage:', error);
            }
            return false;
        }
        
        function clearPlaylistsStorage() {
            try {
                localStorage.removeItem('spotify_playlists');
                localStorage.removeItem('spotify_playlists_timestamp');
                console.log('Cleared playlist cache');
            } catch (error) {
                console.warn('Failed to clear playlist cache:', error);
            }
        }
        
        // Function to update connection status
        async function updateConnectionStatus() {
            try {
                console.log('Checking authentication status...');
                const response = await fetch('/api/status');
                const status = await response.json();
                
                console.log('Authentication status:', status);
                
                // Update Spotify status
                if (status.spotify) {
                    document.getElementById('spotify-status').innerHTML = 
                        '<button class="btn btn-success connect-btn" disabled>Connected</button>';
                    document.getElementById('spotify-status').style.opacity = 1;
                    console.log('✅ Spotify: Already authenticated');
                } else {
                    document.getElementById('spotify-status').innerHTML = 
                        '<button class="btn btn-success connect-btn" onclick="connectToService(\'/auth/spotify/login\', this)">Connect Spotify</button>';
                    document.getElementById('spotify-status').style.opacity = 1;
                    console.log('🔑 Spotify: Authentication required');
                }
                
                // Update YouTube status
                if (status.youtube) {
                    document.getElementById('youtube-status').innerHTML = 
                        '<button class="btn btn-danger connect-btn" disabled>Connected</button>';
                    document.getElementById('youtube-status').style.opacity = 1;
                    console.log('✅ YouTube: Already authenticated');
                } else {
                    document.getElementById('youtube-status').innerHTML = 
                        '<button class="btn btn-danger connect-btn" onclick="connectToService(\'/auth/youtube/login\', this)">Connect YouTube</button>';
                    document.getElementById('youtube-status').style.opacity = 1;
                    console.log('🔑 YouTube: Authentication required');
                }
                
                // Auto-load playlists when both services are connected (use cache first)
                if (status.spotify && status.youtube && !hasAutoLoaded) {
                    hasAutoLoaded = true;
                    console.log('Both services connected - auto-loading playlists');
                    
                    // Try to load from cache first
                    const loadedFromCache = loadPlaylistsFromStorage();
                    
                    if (!loadedFromCache) {
                        // Only fetch from API if no valid cache
                        setTimeout(() => {
                            const refreshBtn = document.getElementById('refresh-playlists-btn');
                            if (refreshBtn && !refreshBtn.classList.contains('htmx-request')) {
                                console.log('Auto-loading playlists from API...');
                                htmx.trigger(refreshBtn, 'click');
                            }
                        }, 500);
                    }
                }
                
                // Check URL parameters for immediate feedback after OAuth redirect (but don't recurse)
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('spotify') === 'connected' || urlParams.get('youtube') === 'connected') {
                    console.log('OAuth redirect detected, status already updated above');
                    // Clear URL parameters to prevent confusion
                    if (window.history.replaceState) {
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                }
                
                if (urlParams.get('error')) {
                    const error = urlParams.get('error');
                    const alertDiv = document.createElement('div');
                    alertDiv.className = 'alert alert-danger alert-dismissible fade show';
                    alertDiv.innerHTML = `
                        <strong>Error:</strong> ${error.replace(/_/g, ' ')}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    `;
                    document.querySelector('.container').prepend(alertDiv);
                }
            } catch (error) {
                console.error('Error checking connection status:', error);
                // Show error state with fallback connect buttons
                document.getElementById('spotify-status').innerHTML = 
                    '<button class="btn btn-success connect-btn" onclick="connectToService(\'/auth/spotify/login\', this)">Connect Spotify</button>';
                document.getElementById('spotify-status').style.opacity = 1;
                
                document.getElementById('youtube-status').innerHTML = 
                    '<button class="btn btn-danger connect-btn" onclick="connectToService(\'/auth/youtube/login\', this)">Connect YouTube</button>';
                document.getElementById('youtube-status').style.opacity = 1;
            }
        }
        
        // Smooth connect function to prevent page flash
        function connectToService(url, button) {
            console.log(`Connecting to service: ${url}`);
            
            // Store original button text
            const originalText = button.innerHTML;
            
            // Show loading state
            button.innerHTML = 'Connecting...';
            button.disabled = true;
            button.classList.add('disabled');
            
            // Use full-page redirect instead of popup
            window.location.href = url;
        }
        
        // Check status on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Clear any leftover sync results from previous sessions
            document.querySelectorAll('[id^="sync-result-"]').forEach(syncResult => {
                syncResult.innerHTML = '';
            });
            
            updateConnectionStatus();
        });
        
        // Listen for OAuth success messages from popup windows
        window.addEventListener('message', function(event) {
            // Verify origin for security
            if (event.origin !== window.location.origin) {
                return;
            }
            
            // Handle OAuth success messages
            if (event.data && event.data.type === 'oauth-success') {
                console.log(`🎉 OAuth success received for ${event.data.service}`);
                
                // Refresh authentication status after successful OAuth
                setTimeout(() => {
                    updateConnectionStatus();
                }, 500); // Small delay to ensure server session is updated
            }
        });
    </script>

    <script>
        // Add logging for button clicks and HTMX events
        document.addEventListener('click', function(event) {
          // Log all button clicks
          if (event.target.matches('button')) {
            console.log(`Button clicked: "${event.target.textContent?.trim()}"`);
            console.log(`Button attributes:`, {
              id: event.target.id,
              class: event.target.className,
              onclick: event.target.getAttribute('onclick'),
              'hx-get': event.target.getAttribute('hx-get'),
              'hx-post': event.target.getAttribute('hx-post'),
              'hx-target': event.target.getAttribute('hx-target')
            });
          }

          // Log sync button clicks specifically
          if (event.target.classList.contains('sync-btn')) {
            const playlistId = event.target.getAttribute('data-playlist-id');
            const playlistName = event.target.getAttribute('data-playlist-name');
            console.log(`Button attributes:`, {
              id: event.target.id,
              class: event.target.className,
              onclick: event.target.onclick,
              'hx-get': event.target.getAttribute('hx-get'),
              'hx-post': event.target.getAttribute('hx-post'),
              'hx-target': event.target.getAttribute('hx-target')
            });
            console.log(`Sync button clicked for playlist: "${playlistName}" (ID: ${playlistId})`);
            console.log(`Making request to: /api/sync/playlist/${playlistId}`);
            
            // Let HTMX handle the request automatically - no manual trigger needed
          }
        });

        // Log all HTMX events
        document.addEventListener('htmx:beforeRequest', function(event) {
          console.log('HTMX request starting:', {
            method: event.detail.requestConfig.verb,
            url: event.detail.requestConfig.path,
            target: event.detail.target,
            timestamp: new Date().toISOString()
          });
          
          // Enhanced sync button handling with real-time progress
          if (event.detail.requestConfig.path.includes('/sync/playlist/')) {
            console.log('Sync request detected:', event.detail);
            const button = event.detail.elt;
            const playlistId = button.dataset.playlistId;
            const playlistName = button.dataset.playlistName;
            
            console.log(`Starting sync for playlist: ${playlistName} (${playlistId})`);
            
            // Start real-time progress updates
            startProgressUpdates(playlistId, playlistName);
            
            // Disable all sync buttons during sync
            document.querySelectorAll('.sync-btn').forEach(btn => {
              btn.disabled = true;
              btn.classList.add('disabled');
            });
            
            // Clear previous sync results
            const syncResult = document.getElementById(`sync-result-${playlistId}`);
            if (syncResult) {
              syncResult.innerHTML = '';
            }
          }
        });

        document.addEventListener('htmx:afterRequest', function(event) {
          const status = event.detail.xhr.status;
          const statusText = event.detail.xhr.statusText;
          console.log(`HTMX request completed:`, {
            status: `${status} ${statusText}`,
            url: event.detail.xhr.responseURL,
            responseLength: event.detail.xhr.responseText?.length || 0,
            timestamp: new Date().toISOString()
          });
          
          // Handle playlist refresh completion to show sync feedback
          if (event.detail.requestConfig?.path?.includes('/auth/spotify/playlists')) {
            const pendingFeedback = sessionStorage.getItem('pendingSyncFeedback');
            if (pendingFeedback && status >= 200 && status < 300) {
              try {
                const feedback = JSON.parse(pendingFeedback);
                const playlistId = feedback.playlistId;
                const feedbackHtml = feedback.feedbackHtml;
                
                // Find the synced playlist in the refreshed list
                setTimeout(() => {
                  const playlistElement = document.querySelector(`[data-playlist-id="${playlistId}"]`);
                  if (playlistElement && feedbackHtml) {
                    // Find the playlist's sync result area within the row
                    const syncResultArea = playlistElement.querySelector(`#sync-result-${playlistId}`);
                    if (syncResultArea) {
                      // Place feedback within the playlist's sync result area
                      syncResultArea.innerHTML = feedbackHtml;
                      syncResultArea.style.display = 'block';
                      
                      // Add dismissal functionality
                      const dismissButton = syncResultArea.querySelector('.btn-close');
                      if (dismissButton) {
                        dismissButton.addEventListener('click', function() {
                          syncResultArea.style.display = 'none';
                        });
                      }
                      
                      // Auto-hide after 15 seconds with hover cancellation
                      let fadeTimeout;
                      let fadeInProgress = false;
                      
                      const startFade = () => {
                        fadeTimeout = setTimeout(() => {
                          if (syncResultArea && syncResultArea.style.display !== 'none') {
                            fadeInProgress = true;
                            syncResultArea.style.opacity = '0';
                            syncResultArea.style.transition = 'opacity 0.5s ease-out';
                            setTimeout(() => {
                              if (fadeInProgress) {
                                syncResultArea.style.display = 'none';
                                // Reset for next use
                                syncResultArea.style.opacity = '1';
                                syncResultArea.style.transition = '';
                              }
                            }, 500);
                          }
                        }, 15000); // 15 second delay before fade starts
                      };
                      
                      const cancelFade = () => {
                        if (fadeTimeout) {
                          clearTimeout(fadeTimeout);
                          fadeTimeout = null;
                        }
                        if (fadeInProgress) {
                          fadeInProgress = false;
                          syncResultArea.style.opacity = '1';
                          syncResultArea.style.transition = '';
                        }
                      };
                      
                      // Add hover listeners to cancel fade
                      syncResultArea.addEventListener('mouseenter', cancelFade);
                      
                      // Start the fade timer
                      startFade();
                    }
                    
                    // Scroll to the synced playlist
                    playlistElement.scrollIntoView({ 
                      behavior: 'smooth', 
                      block: 'center' 
                    });
                  }
                  
                  // Clear the pending feedback
                  sessionStorage.removeItem('pendingSyncFeedback');
                }, 100); // Add missing closing parenthesis and delay parameter for setTimeout
                
              } catch (error) {
                console.error('Error processing pending sync feedback:', error);
                sessionStorage.removeItem('pendingSyncFeedback');
              }
            }
          }
          
          if (status >= 400) {
            console.error('HTMX request failed:', event.detail.xhr.responseText);
          } else {
            console.log('HTMX request successful');
          }
        });

        document.addEventListener('htmx:responseError', function(event) {
          console.error('HTMX response error:', event.detail);
        });

        document.addEventListener('htmx:sendError', function(event) {
          console.error('HTMX send error:', event.detail);
        });

        // Log page navigation
        window.addEventListener('beforeunload', function(event) {
          console.log('Page navigation detected');
        });

        // Log any JavaScript errors
        window.addEventListener('error', function(event) {
          console.error('JavaScript error:', {
            message: event.message,
            filename: event.filename,
            line: event.lineno,
            column: event.colno,
            error: event.error
          });
        });

        // Log when page is fully loaded
        console.log('Page JavaScript loaded at:', new Date().toISOString());
    </script>

    <script>
        // Add HTMX error handling and playlist caching
        document.body.addEventListener('htmx:sendError', function(evt) {
            console.error('HTMX Send Error:', evt.detail);
            const target = evt.target;
            if (target && target.id === 'refresh-playlists-btn') {
                const content = document.getElementById('playlists-content');
                if (content) {
                    content.innerHTML = `
                        <div class="alert alert-warning">
                            <strong>Connection Issue:</strong> Unable to load playlists. 
                            <button class="btn btn-outline-primary btn-sm ms-2" onclick="document.getElementById('refresh-playlists-btn').click()">
                                Try Again
                            </button>
                        </div>
                    `;
                }
            }
        });
        
        document.body.addEventListener('htmx:responseError', function(evt) {
            console.error('HTMX Response Error:', evt.detail);
        });
        
        document.body.addEventListener('htmx:timeout', function(evt) {
            console.error('HTMX Timeout:', evt.detail);
        });
        
        // Save playlists to cache when successfully loaded
        document.body.addEventListener('htmx:afterSettle', function(evt) {
            const target = evt.target;
            if (target && target.id === 'playlists-content') {
                // Check if the content contains actual playlists (not error messages)
                const playlistItems = target.querySelectorAll('.playlist-item');
                if (playlistItems.length > 0) {
                    console.log(`Caching ${playlistItems.length} playlists`);
                    savePlaylistsToStorage(target.innerHTML);
                    
                    // Process HTMX attributes on newly loaded content
                    htmx.process(target);
                    console.log('HTMX processed on dynamically loaded playlists');
                    
                    // Add manual event listeners for sync buttons since HTMX processing may not work
                    const syncButtons = target.querySelectorAll('.sync-btn');
                    console.log(`Found ${syncButtons.length} sync buttons to attach listeners to`);
                    
                    syncButtons.forEach((button, index) => {
                        // Remove any existing listeners to prevent duplicates
                        const newButton = button.cloneNode(true);
                        button.parentNode.replaceChild(newButton, button);
                        
                        newButton.addEventListener('click', function(e) {
                            e.preventDefault();
                            console.log(`🔥 SYNC BUTTON CLICKED! Button ${index + 1}`);
                            
                            const playlistId = this.dataset.playlistId;
                            const playlistName = this.dataset.playlistName;
                            const targetId = this.getAttribute('hx-target');
                            const url = this.getAttribute('hx-post');
                            
                            console.log(`Manual sync button clicked for: ${playlistName} (${playlistId})`);
                            console.log(`Target: ${targetId}, URL: ${url}`);
                            
                            // Start real-time progress updates
                            startProgressUpdates(playlistId, playlistName);
                            
                            // Disable all sync buttons during sync
                            document.querySelectorAll('.sync-btn').forEach(btn => {
                                btn.disabled = true;
                                btn.classList.add('disabled');
                            });
                            
                            // Clear previous sync results
                            const syncResult = document.getElementById(`sync-result-${playlistId}`);
                            if (syncResult) {
                                syncResult.innerHTML = '';
                            }
                            
                            // Make manual HTMX request
                            htmx.ajax('POST', url, {
                                target: targetId,
                                swap: 'innerHTML'
                            }).then(() => {
                                // Hide the blue progress area since sync is complete
                                const progressDiv = document.getElementById(`progress-${playlistId}`);
                                if (progressDiv) {
                                    progressDiv.style.display = 'none';
                                }
                                
                                // Show the sync result area after content is loaded
                                const syncResult = document.getElementById(`sync-result-${playlistId}`);
                                if (syncResult && syncResult.innerHTML.trim() !== '') {
                                    // Check if sync was successful by looking for success indicators
                                    const isSuccessful = syncResult.innerHTML.includes('successfully') || 
                                                        syncResult.innerHTML.includes('data-sync-success="true"');
                                    
                                    if (isSuccessful) {
                                        // For successful syncs, store feedback and trigger playlist refresh for reordering
                                        sessionStorage.setItem('pendingSyncFeedback', JSON.stringify({
                                            playlistId: playlistId,
                                            feedbackHtml: syncResult.innerHTML
                                        }));
                                        
                                        // Hide the summary initially - it will appear after refresh in correct position
                                        syncResult.style.display = 'none';
                                        
                                        // Trigger playlist refresh to reorder lists and show new position
                                        const refreshBtn = document.getElementById('refresh-playlists-btn');
                                        if (refreshBtn) {
                                            console.log(`🔄 Triggering playlist refresh for newly synced playlist: ${playlistId}`);
                                            refreshBtn.click();
                                        }
                                    } else {
                                        // For non-successful syncs, show result immediately (no reordering needed)
                                        syncResult.style.display = 'block';
                                        
                                        // Add dismissal functionality if not already present
                                        const dismissButton = syncResult.querySelector('.btn-close');
                                        if (dismissButton) {
                                            dismissButton.addEventListener('click', function() {
                                                syncResult.style.display = 'none';
                                            });
                                        }
                                        
                                        // Auto-hide after 15 seconds with hover cancellation
                                        let fadeTimeout;
                                        let fadeInProgress = false;
                                        
                                        const startFade = () => {
                                            fadeTimeout = setTimeout(() => {
                                                if (syncResult && syncResult.style.display !== 'none') {
                                                    fadeInProgress = true;
                                                    syncResult.style.opacity = '0';
                                                    syncResult.style.transition = 'opacity 0.5s ease-out';
                                                    setTimeout(() => {
                                                        if (fadeInProgress) {
                                                            syncResult.style.display = 'none';
                                                            // Reset for next use
                                                            syncResult.style.opacity = '1';
                                                            syncResult.style.transition = '';
                                                        }
                                                    }, 500);
                                                }
                                            }, 15000); // Triple the time from 5 to 15 seconds
                                        };
                                        
                                        const cancelFade = () => {
                                            if (fadeTimeout) {
                                                clearTimeout(fadeTimeout);
                                                fadeTimeout = null;
                                            }
                                            if (fadeInProgress) {
                                                fadeInProgress = false;
                                                syncResult.style.opacity = '1';
                                                syncResult.style.transition = '';
                                            }
                                        };
                                        
                                        // Add hover listeners to cancel fade
                                        syncResult.addEventListener('mouseenter', cancelFade);
                                        
                                        // Start the fade timer
                                        startFade();
                                    }
                                } else {
                                    // Re-enable all sync buttons
                                    document.querySelectorAll('.sync-btn').forEach(btn => {
                                        btn.disabled = false;
                                        btn.classList.remove('disabled');
                                    });
                                }
                            }).catch((error) => {
                                console.error('Sync request failed:', error);
                                
                                // Re-enable all sync buttons even on error
                                document.querySelectorAll('.sync-btn').forEach(btn => {
                                    btn.disabled = false;
                                    btn.classList.remove('disabled');
                                });
                            });
                        });
                    });
                    console.log(`Added manual event listeners to ${syncButtons.length} sync buttons`);
                }
            }
        });
        
        // Clear cache when filter toggle changes (since data structure changes)
        document.getElementById('ownPlaylistsOnly')?.addEventListener('change', function() {
            console.log('Filter changed, clearing playlist cache');
            clearPlaylistsStorage();
        });
        
        // Playlist details functionality
        function savePlaylistDetailsToStorage(playlistId, detailsHtml) {
            try {
                const storageKey = `playlist_details_${playlistId}`;
                localStorage.setItem(storageKey, detailsHtml);
                localStorage.setItem(`${storageKey}_timestamp`, Date.now().toString());
                console.log(`Playlist details saved for: ${playlistId}`);
            } catch (error) {
                console.warn('Failed to save playlist details to localStorage:', error);
            }
        }
        
        function loadPlaylistDetailsFromStorage(playlistId) {
            try {
                const storageKey = `playlist_details_${playlistId}`;
                const timestamp = localStorage.getItem(`${storageKey}_timestamp`);
                const detailsHtml = localStorage.getItem(storageKey);
                
                if (timestamp && detailsHtml) {
                    const ageMs = Date.now() - parseInt(timestamp);
                    const ageMinutes = ageMs / (1000 * 60);
                    
                    // Cache expires after 10 minutes (shorter than main playlist cache)
                    if (ageMinutes < 10) {
                        console.log(`Loading cached playlist details for ${playlistId} (${Math.round(ageMinutes)} minutes old)`);
                        return detailsHtml;
                    } else {
                        console.log(`Cached playlist details expired for ${playlistId}`);
                        clearPlaylistDetailsStorage(playlistId);
                    }
                }
            } catch (error) {
                console.warn('Failed to load playlist details from localStorage:', error);
            }
            return null;
        }
        
        function clearPlaylistDetailsStorage(playlistId) {
            try {
                const storageKey = `playlist_details_${playlistId}`;
                localStorage.removeItem(storageKey);
                localStorage.removeItem(`${storageKey}_timestamp`);
                console.log(`Cleared playlist details cache for: ${playlistId}`);
            } catch (error) {
                console.warn('Failed to clear playlist details cache:', error);
            }
        }
        
        // Global function for toggling playlist details
        window.togglePlaylistDetails = function(playlistId, expandArea) {
            console.log(`Toggle clicked for playlist: ${playlistId}, current expanded: ${expandArea.dataset.expanded}`);
            const detailsContainer = document.getElementById(`details-${playlistId}`);
            const isExpanded = expandArea.dataset.expanded === 'true';
            const indicator = expandArea.querySelector('.expand-indicator');
            
            if (isExpanded) {
                console.log(`Collapsing playlist details: ${playlistId}`);
                detailsContainer.style.display = 'none';
                indicator.textContent = '▼';
                indicator.style.color = '#666';
                expandArea.dataset.expanded = 'false';
                expandArea.title = 'Show track details';
                console.log(`Collapsed playlist details: ${playlistId}`);
            } else {
                console.log(`Expanding playlist details: ${playlistId}`);
                const cachedDetails = loadPlaylistDetailsFromStorage(playlistId);
                
                if (cachedDetails) {
                    // Use cached data
                    detailsContainer.innerHTML = cachedDetails;
                    detailsContainer.style.display = 'block';
                    indicator.textContent = '▲';
                    indicator.style.color = '#ff0040';
                    expandArea.dataset.expanded = 'true';
                    expandArea.title = 'Hide track details';
                    console.log(`Expanded with cached data: ${playlistId}`);
                } else {
                    // Load from API
                    console.log(`Loading playlist details from API: ${playlistId}`);
                    detailsContainer.style.display = 'block';
                    indicator.textContent = '...';
                    indicator.style.color = '#999';
                    expandArea.style.pointerEvents = 'none';
                    expandArea.style.display = 'none';
                    
                    // Use HTMX to fetch details
                    htmx.ajax('GET', `/api/playlistDetails/playlist/${playlistId}`, {
                        target: `#details-${playlistId}`,
                        swap: 'innerHTML'
                    }).then(() => {
                        // Success - update indicator
                        indicator.textContent = '▲';
                        indicator.style.color = '#ff0040';
                        expandArea.dataset.expanded = 'true';
                        expandArea.style.pointerEvents = 'auto';
                        expandArea.style.display = 'flex';
                        expandArea.title = 'Hide track details';
                        
                        // Save to cache
                        const detailsHtml = detailsContainer.innerHTML;
                        savePlaylistDetailsToStorage(playlistId, detailsHtml);
                        
                        console.log(`Loaded and cached playlist details: ${playlistId}`);
                    }).catch((error) => {
                        // Error - reset indicator
                        console.error('Error loading playlist details:', error);
                        indicator.textContent = '▼';
                        indicator.style.color = '#666';
                        expandArea.dataset.expanded = 'false';
                        expandArea.style.pointerEvents = 'auto';
                        expandArea.style.display = 'flex';
                        expandArea.title = 'Show track details';
                        detailsContainer.style.display = 'none';
                    });
                }
            }
        };
    </script>

    <script>
        // Add Server-Sent Events handling for real-time sync progress updates
        function startProgressUpdates(playlistId, playlistName) {
            console.log(`🔄 Starting real-time progress updates for playlist: ${playlistName} (${playlistId})`);
            
            // Show the progress area
            const progressDiv = document.getElementById(`progress-${playlistId}`);
            if (progressDiv) {
                progressDiv.style.display = 'block';
                const progressContent = progressDiv.querySelector('.progress-content');
                
                // Create initial structure with persistent spinner
                progressContent.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <div class="progress-spinner" style="border: 2px solid #2196f3; border-top-color: transparent; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite;"></div>
                        <div class="progress-text">
                            <span class="progress-message">Connecting to progress updates...</span>
                            <div class="progress-details"></div>
                        </div>
                    </div>
                `;
            }
            
            // Create an EventSource object to listen for Server-Sent Events
            const eventSource = new EventSource(`/api/progress/playlist/${playlistId}`);
            
            // Handle incoming progress updates
            eventSource.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    console.log(`📡 Received progress update for playlist ${playlistId}:`, data);
                    
                    // Update the progress display
                    if (progressDiv) {
                        const progressContent = progressDiv.querySelector('.progress-content');
                        const progressText = progressContent.querySelector('.progress-text');
                        
                        if (data.type === 'progress') {
                            // Show progress with spinner
                            progressText.querySelector('.progress-message').textContent = data.message;
                            progressText.querySelector('.progress-details').textContent = data.details || '';
                            progressText.querySelector('.progress-details').style.opacity = data.details ? '1' : '0';
                        } else if (data.type === 'complete') {
                            // Show completion message with success styling
                            progressText.querySelector('.progress-message').textContent = data.message;
                            progressText.querySelector('.progress-details').textContent = data.details || '';
                            progressText.querySelector('.progress-details').style.opacity = data.details ? '1' : '0';
                            progressText.style.color = '#4caf50';
                            progressContent.querySelector('.progress-spinner').style.display = 'none';
                            
                            // Close the EventSource connection
                            eventSource.close();
                            
                            // Hide progress area after 5 seconds and show final sync result
                            setTimeout(() => {
                                if (progressDiv) {
                                    progressDiv.style.display = 'none';
                                }
                            }, 5000);
                        } else if (data.type === 'error') {
                            // Show error message
                            progressText.querySelector('.progress-message').textContent = data.message;
                            progressText.querySelector('.progress-details').textContent = data.details || '';
                            progressText.querySelector('.progress-details').style.opacity = data.details ? '1' : '0';
                            progressText.style.color = '#f44336';
                            progressContent.querySelector('.progress-spinner').style.display = 'none';
                            
                            // Close the EventSource connection
                            eventSource.close();
                        }
                    }
                } catch (error) {
                    console.error('Error parsing progress update:', error, event.data);
                }
            };
            
            // Handle connection events
            eventSource.onopen = function() {
                console.log(`✅ Connected to progress updates for playlist ${playlistId}`);
            };
            
            eventSource.onerror = function(error) {
                console.error(`❌ Error with progress updates for playlist ${playlistId}:`, error);
                if (progressDiv) {
                    progressDiv.querySelector('.progress-content').innerHTML = `
                        <div style="color: #f44336;">
                            <strong>Connection error</strong><br>
                            <small>Unable to receive real-time updates</small>
                        </div>
                    `;
                }
            };
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
