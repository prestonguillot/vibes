<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify to YouTube Playlist Sync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>
    <script src="https://unpkg.com/hyperscript.org@0.9.11"></script>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="text-center mb-5">
                    <h1 class="display-4">🎵 Spotify ➡️ YouTube</h1>
                    <p class="lead">Sync your Spotify playlists to YouTube with music videos</p>
                </div>

                <!-- Connection Status -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-body text-center">
                                <h5 class="card-title">
                                    <span style="font-size: 24px; margin-right: 8px;">🎵</span>
                                    Spotify
                                </h5>
                                <div id="spotify-status">
                                    <button class="btn btn-success" onclick="window.location.href='/auth/spotify/login'">
                                        Connect Spotify
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-body text-center">
                                <h5 class="card-title">
                                    <span style="font-size: 24px; margin-right: 8px;">📺</span>
                                    YouTube
                                </h5>
                                <div id="youtube-status">
                                    <button class="btn btn-danger" onclick="window.location.href='/auth/youtube/login'">
                                        Connect YouTube
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Playlists Section -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Your Playlists</h5>
                        <button class="btn btn-outline-primary btn-sm float-end" 
                                hx-get="/auth/spotify/playlists" 
                                hx-target="#playlists-content"
                                hx-vals='js:{"ownOnly": document.getElementById("ownPlaylistsOnly")?.checked || false}'
                                hx-indicator="#loading">
                            Load Playlists
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-12">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h4>Your Spotify Playlists</h4>
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="ownPlaylistsOnly" 
                                               hx-get="/auth/spotify/playlists"
                                               hx-target="#playlists-content"
                                               hx-trigger="change"
                                               hx-vals='js:{"ownOnly": document.getElementById("ownPlaylistsOnly").checked}'>
                                        <label class="form-check-label" for="ownPlaylistsOnly">
                                            Show only playlists I created
                                        </label>
                                    </div>
                                </div>
                                <div id="playlists-content">
                                    <p class="text-muted text-center">Connect to Spotify and click "Load Playlists" to see your playlists</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Sync Results -->
                <div id="sync-result" class="mt-4"></div>

                <!-- Loading Indicator -->
                <div id="loading" class="text-center mt-3" style="display: none;">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2">Syncing playlist...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Connection Status Script -->
    <script>
        // Check connection status from server
        async function updateConnectionStatus() {
            try {
                const response = await fetch('/api/status');
                const status = await response.json();
                
                // Update Spotify status
                if (status.spotify) {
                    document.getElementById('spotify-status').innerHTML = 
                        '<span class="badge bg-success">✅ Connected</span>';
                } else {
                    document.getElementById('spotify-status').innerHTML = 
                        '<button class="btn btn-success" onclick="window.location.href=\'/auth/spotify/login\'">Connect Spotify</button>';
                }
                
                // Update YouTube status
                if (status.youtube) {
                    document.getElementById('youtube-status').innerHTML = 
                        '<span class="badge bg-success">✅ Connected</span>';
                } else {
                    document.getElementById('youtube-status').innerHTML = 
                        '<button class="btn btn-danger" onclick="window.location.href=\'/auth/youtube/login\'">Connect YouTube</button>';
                }
            } catch (error) {
                console.error('Error checking connection status:', error);
            }
        }
        
        // Check status on page load
        updateConnectionStatus();
        
        // Also check URL parameters for immediate feedback after OAuth redirect
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('spotify') === 'connected' || urlParams.get('youtube') === 'connected') {
            // Refresh status after OAuth redirect
            setTimeout(updateConnectionStatus, 500);
        }
        
        if (urlParams.get('error')) {
            const error = urlParams.get('error');
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert alert-danger alert-dismissible fade show';
            alertDiv.innerHTML = `
                <strong>Error:</strong> ${error.replace(/_/g, ' ')}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            document.querySelector('.container').prepend(alertDiv);
        }
    </script>

    <script>
        // Add logging for button clicks and HTMX events
        document.addEventListener('click', function(event) {
          // Log all button clicks
          if (event.target.matches('button')) {
            console.log(`🖱️ Button clicked: "${event.target.textContent?.trim()}"`);
            console.log(`🔗 Button attributes:`, {
              id: event.target.id,
              class: event.target.className,
              onclick: event.target.getAttribute('onclick'),
              'hx-get': event.target.getAttribute('hx-get'),
              'hx-post': event.target.getAttribute('hx-post'),
              'hx-target': event.target.getAttribute('hx-target')
            });
          }

          // Log sync button clicks specifically
          if (event.target.matches('button[hx-post]')) {
            const playlistName = event.target.getAttribute('data-playlist-name') || 'Unknown';
            const playlistId = event.target.getAttribute('data-playlist-id') || 'Unknown';
            console.log(`🔄 Sync button clicked for playlist: "${playlistName}" (ID: ${playlistId})`);
            console.log(`📡 Making request to: ${event.target.getAttribute('hx-post')}`);
          }

          // Log navigation clicks (Connect buttons)
          if (event.target.getAttribute('onclick')) {
            console.log(`🔗 Navigation click detected: ${event.target.getAttribute('onclick')}`);
          }
        });

        // Log all HTMX events
        document.addEventListener('htmx:beforeRequest', function(event) {
          console.log('📤 HTMX request starting:', {
            method: event.detail.requestConfig.verb,
            url: event.detail.requestConfig.path,
            target: event.detail.target,
            timestamp: new Date().toISOString()
          });
        });

        document.addEventListener('htmx:afterRequest', function(event) {
          const status = event.detail.xhr.status;
          const statusText = event.detail.xhr.statusText;
          console.log(`📥 HTMX request completed:`, {
            status: `${status} ${statusText}`,
            url: event.detail.xhr.responseURL,
            responseLength: event.detail.xhr.responseText?.length || 0,
            timestamp: new Date().toISOString()
          });
          
          if (status >= 400) {
            console.error('❌ HTMX request failed:', event.detail.xhr.responseText);
          } else {
            console.log('✅ HTMX request successful');
          }
        });

        document.addEventListener('htmx:responseError', function(event) {
          console.error('💥 HTMX response error:', event.detail);
        });

        document.addEventListener('htmx:sendError', function(event) {
          console.error('📡 HTMX send error:', event.detail);
        });

        // Log page navigation
        window.addEventListener('beforeunload', function(event) {
          console.log('🔄 Page navigation detected');
        });

        // Log any JavaScript errors
        window.addEventListener('error', function(event) {
          console.error('❌ JavaScript error:', {
            message: event.message,
            filename: event.filename,
            line: event.lineno,
            column: event.colno,
            error: event.error
          });
        });

        // Log when page is fully loaded
        console.log('🎯 Page JavaScript loaded at:', new Date().toISOString());
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
